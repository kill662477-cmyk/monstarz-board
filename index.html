<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>츠캄몬스타즈 현황판</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2c;
      --text: #eef4ff;
      --muted: #9fb3ca;
      --line: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
  --t3: linear-gradient(135deg, #ef4444, #f97316);
  --t4: linear-gradient(135deg, #f59e0b, #fde047);
  --t5: linear-gradient(135deg, #22c55e, #4ade80);
  --t6: linear-gradient(135deg, #3b82f6, #60a5fa);
  --t7: linear-gradient(135deg, #8b5cf6, #c084fc);
  --t8: linear-gradient(135deg, #f43f5e, #fb7185);
  --t9: linear-gradient(135deg, #ec4899, #f9a8d4);
      --leader: linear-gradient(135deg, #f59e0b, #fcd34d);
      --coach: linear-gradient(135deg, #059669, #34d399);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Inter", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(18, 112, 255, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 25%),
        linear-gradient(180deg, #04101d, #081321 35%, #07111f 100%);
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 10px 24px;
    }

    .hero {
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(10,24,43,.95), rgba(15,39,66,.92));
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 6px;
    }

    .hero-top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-copy h1 {
      font-size: 22px;
      margin: 0 0 4px;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .brand-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.4;
    }

    .tab-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,.11);
    }

    .tab-btn.active {
      background: var(--accent-soft);
      border-color: rgba(96, 165, 250, .48);
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(96,165,250,.18);
    }

    .summary-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .summary-card {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      min-height: 60px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      word-break: break-word;
      line-height: 1.15;
    }

    .summary-card .sub {
      color: var(--muted);
      margin-top: 2px;
      font-size: 10px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 8px;
    }

    .search-box, .filter-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .search-box {
      flex: 1 1 340px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      min-height: 36px;
    }

    .search-box input {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      width: 100%;
      font-size: 12px;
    }

    .search-box input::placeholder { color: #7f95ae; }

    .filter-box select {
      min-height: 36px;
      border: 0;
      outline: none;
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      font-size: 12px;
      min-width: 120px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .section-head .count {
      color: var(--muted);
      font-size: 13px;
    }

    .leaders-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .tier-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .member-card {
      position: relative;
      background: linear-gradient(180deg, rgba(18,37,61,.95), rgba(10,23,39,.96));
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .member-banner {
      height: 46px;
      position: relative;
      background: linear-gradient(135deg, rgba(15,95,212,.85), rgba(15,139,255,.55));
    }

    .member-banner.t3 { background: var(--t3); }
    .member-banner.t4 { background: var(--t4); }
    .member-banner.t5 { background: var(--t5); }
    .member-banner.t6 { background: var(--t6); }
    .member-banner.t7 { background: var(--t7); }
    .member-banner.t8 { background: var(--t8); }
    .member-banner.t9 { background: var(--t9); }
    .member-banner.leader { background: var(--leader); }
    .member-banner.coach { background: var(--coach); }

    .badge-row {
      position: absolute;
      top: 7px;
      left: 7px;
      right: 7px;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      z-index: 2;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .02em;
      background: rgba(4,13,24,.45);
      border: 1px solid rgba(255,255,255,.16);
      white-space: nowrap;
    }

    .chip.live { background: rgba(229,57,53,.24); color: #ffe0de; }
    .chip.offline { background: rgba(35,48,69,.72); color: #d1d9e6; }

    .chip.live,
    .chip.offline {
      min-height: 22px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 900;
    }

    .member-body {
      padding: 0 8px 8px;
      margin-top: -18px;
      position: relative;
      z-index: 1;
    }

    .avatar-wrap {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255,255,255,.42), rgba(255,255,255,.12));
      box-shadow: 0 8px 18px rgba(0,0,0,.24);
      margin-bottom: 8px;
    }

    .avatar-wrap.live-border {
      background: linear-gradient(135deg, #ff4d4f, #ff7a7a);
      box-shadow: 0 0 0 2px rgba(255, 77, 79, 0.25), 0 8px 18px rgba(255, 77, 79, 0.18);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 9px;
      object-fit: cover;
      background: #1d2d44;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }

    .name-row .name {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.03em;
      min-width: 0;
      word-break: keep-all;
      line-height: 1.2;
    }

    .race-badge {
      flex-shrink: 0;
      font-size: 9px;
      padding: 3px 5px;
      border-radius: 6px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #d7e2f0;
      white-space: nowrap;
    }

    .meta-list {
      display: grid;
      gap: 3px;
      margin-bottom: 8px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      color: #d9e3ef;
      font-size: 10px;
    }

    .meta-item .label { color: var(--muted); }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(54px, 1fr));
      gap: 4px;
    }

    .btn-link {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 26px;
      padding: 4px 4px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }

    .btn-stream { background: rgba(15,95,212,.22); }
    .btn-youtube { background: rgba(229,57,53,.18); }
    .btn-profile { background: rgba(255,255,255,.06); }

    .tier-section { margin-top: 8px; }

    .tier-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 8px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 6px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .tier-title h3 {
      margin: 0;
      font-size: 12px;
      letter-spacing: -0.03em;
    }

    .tier-title p {
      margin: 0;
      font-size: 11px;
      color: rgba(255,255,255,.82);
    }

    .tier-title.t3 { background: var(--t3); }
    .tier-title.t4 { background: var(--t4); }
    .tier-title.t5 { background: var(--t5); }
    .tier-title.t6 { background: var(--t6); }
    .tier-title.t7 { background: var(--t7); }
    .tier-title.t8 { background: var(--t8); }
    .tier-title.t9 { background: var(--t9); }

    .empty {
      border: 1px dashed rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 20px 14px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      font-size: 13px;
    }

    .screen { display: block; }
    .screen.hidden { display: none; }

    .notice-wrap {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .notice-card {
      background: linear-gradient(180deg, rgba(18,37,61,.95), rgba(10,23,39,.96));
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .notice-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .notice-head-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .notice-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.12);
      flex-shrink: 0;
      background: rgba(255,255,255,.06);
    }

    .notice-station-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .notice-station {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.16);
      border: 1px solid rgba(96,165,250,.22);
      color: #dbeafe;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .notice-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .notice-summary-link {
      display: block;
      color: #d6e2f0;
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      text-decoration: none;
      transition: .15s ease;
    }

    .notice-summary-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .notice-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 10px;
    }

    @media (max-width: 1180px) {
      .leaders-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tier-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 860px) {
      .leaders-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .tier-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .brand-copy h1 { font-size: 22px; }
    }

    @media (max-width: 768px) {
      .wrap {
        max-width: 100%;
        padding: 6px 6px 14px;
      }

      .hero {
        padding: 8px;
        border-radius: 10px;
      }

      .hero-top {
        gap: 8px;
      }

      .brand {
        gap: 8px;
        align-items: center;
      }

      .brand-logo {
        width: 38px;
        height: 38px;
        border-radius: 10px;
      }

      .brand-copy h1 {
        font-size: 14px;
        line-height: 1.15;
        margin: 0 0 2px;
      }

      .brand-copy p {
        font-size: 9px;
        line-height: 1.2;
      }

      .tab-row {
        gap: 6px;
        margin-top: 4px;
      }

      .tab-btn {
        min-height: 24px;
        font-size: 9px;
        padding: 0 8px;
      }

      .summary-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 3px;
        margin-top: 5px;
      }

      .summary-card {
        padding: 4px;
        min-height: 34px;
        border-radius: 7px;
      }

      .summary-card .label {
        font-size: 6px;
        margin-bottom: 1px;
      }

      .summary-card .value {
        font-size: 9px;
      }

      .summary-card .sub {
        font-size: 5px;
        margin-top: 1px;
        line-height: 1.05;
      }

      .toolbar {
        gap: 4px;
        margin-bottom: 5px;
      }

      .search-box {
        min-height: 28px;
        padding: 0 8px;
      }

      .search-box input {
        font-size: 10px;
      }

      .filter-box select {
        min-height: 28px;
        min-width: 92px;
        font-size: 10px;
        padding: 0 8px;
      }

      .section-head {
        margin: 8px 0 4px;
      }

      .section-head h2 {
        font-size: 13px;
      }

      .section-head .count {
        font-size: 9px;
      }

      .leaders-grid,
      .tier-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .member-card {
        border-radius: 10px;
      }

      .member-banner {
        height: 28px;
      }

      .badge-row {
        top: 4px;
        left: 4px;
        right: 4px;
        gap: 3px;
      }

      .chip {
        min-height: 12px;
        padding: 1px 4px;
        font-size: 6px;
      }

      .chip.live,
      .chip.offline {
        min-height: 16px;
        padding: 2px 6px;
        font-size: 8px;
      }

      .member-body {
        padding: 0 4px 4px;
        margin-top: -10px;
      }

      .avatar-wrap {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        margin-bottom: 3px;
      }

      .avatar {
        border-radius: 5px;
      }

      .name-row {
        gap: 3px;
        margin-bottom: 2px;
      }

      .name-row .name {
        font-size: 9px;
      }

      .race-badge {
        font-size: 6px;
        padding: 1px 3px;
        border-radius: 4px;
      }

      .meta-list {
        gap: 1px;
        margin-bottom: 3px;
      }

      .meta-item {
        font-size: 7px;
      }

      .links {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .btn-link {
        min-height: 16px;
        font-size: 7px;
        padding: 1px 2px;
        border-radius: 4px;
      }

      .tier-title {
        padding: 5px 6px;
        border-radius: 7px;
        margin-bottom: 4px;
      }

      .tier-title h3 {
        font-size: 11px;
      }

      .tier-title p {
        font-size: 7px;
      }
    }

    @media (max-width: 480px) {
      .wrap {
        padding: 8px 6px 18px;
      }

      .hero {
        padding: 10px;
        border-radius: 12px;
      }

      .brand {
        gap: 8px;
        align-items: flex-start;
      }

      .brand-logo {
        width: 42px;
        height: 42px;
        border-radius: 10px;
      }

      .brand-copy h1 {
        font-size: 16px;
      }

      .brand-copy p {
        font-size: 10px;
      }

      .tab-btn {
        min-height: 30px;
        font-size: 10px;
        padding: 0 10px;
      }

      .summary-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 3px;
      }

      .summary-card {
        padding: 5px;
        min-height: 38px;
        border-radius: 7px;
      }

      .summary-card .label {
        font-size: 6px;
        margin-bottom: 1px;
      }

      .summary-card .value {
        font-size: 10px;
        line-height: 1.05;
      }

      .summary-card .sub {
        font-size: 5px;
        margin-top: 1px;
        line-height: 1.1;
      }

      .toolbar {
        gap: 6px;
        margin-bottom: 6px;
      }

      .search-box,
      .filter-box {
        width: 100%;
      }

      .search-box {
        min-height: 34px;
        padding: 0 8px;
        border-radius: 10px;
      }

      .search-box input {
        font-size: 11px;
      }

      .filter-box select {
        width: 100%;
        min-height: 34px;
        font-size: 11px;
        padding: 0 8px;
      }

      .section-head {
        margin: 12px 0 6px;
      }

      .section-head h2 {
        font-size: 16px;
      }

      .section-head .count {
        font-size: 11px;
      }

      .leaders-grid,
      .tier-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
      }

      .member-card {
        border-radius: 8px;
      }

      .member-banner {
        height: 24px;
      }

      .badge-row {
        top: 3px;
        left: 3px;
        right: 3px;
        gap: 2px;
      }

      .chip {
        min-height: 11px;
        padding: 1px 3px;
        font-size: 5px;
      }

      .chip.live,
      .chip.offline {
        min-height: 15px;
        padding: 2px 5px;
        font-size: 7px;
      }

      .member-body {
        padding: 0 3px 3px;
        margin-top: -8px;
      }

      .avatar-wrap {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        margin-bottom: 2px;
      }

      .avatar {
        border-radius: 4px;
      }

      .name-row {
        margin-bottom: 2px;
        gap: 2px;
      }

      .name-row .name {
        font-size: 8px;
      }

      .race-badge {
        font-size: 5px;
        padding: 1px 2px;
        border-radius: 3px;
      }

      .meta-list {
        gap: 1px;
        margin-bottom: 2px;
      }

      .meta-item {
        font-size: 6px;
      }

      .links {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .btn-link {
        min-height: 14px;
        font-size: 6px;
        padding: 1px 2px;
        border-radius: 4px;
      }

      .tier-title {
        padding: 4px 6px;
        border-radius: 6px;
        margin-bottom: 4px;
      }

      .tier-title h3 {
        font-size: 10px;
      }

      .tier-title p {
        font-size: 6px;
      }

      .notice-card {
        padding: 7px;
        border-radius: 8px;
      }

      .notice-head {
        margin-bottom: 6px;
      }

      .notice-summary-link {
        font-size: 9px;
        line-height: 1.35;
      }

      .notice-avatar {
        width: 24px;
        height: 24px;
      }

  function formatCheckedAt(value) {
    if (!value) return "-";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
  }

  function extractSoopUserId(url) {
    if (!url || url === "#") return null;
    const stationMatch = url.match(/sooplive\.com\/station\/([^/?#]+)/i);
    if (stationMatch) return stationMatch[1];
    const playMatch = url.match(/play\.sooplive\.com\/([^/?#]+)/i);
    if (playMatch) return playMatch[1];
    return null;
  }

  function mergeStatuses(list) {
    return list.map((member) => {
      const userId = extractSoopUserId(member.stream || member.live);
      if (!userId) return member;
      return {
        ...member,
        status: liveStatusMap[userId] === true ? "live" : "offline"
      };
    });
  }

  function getFilteredMembers() {
    const q = searchInput.value.trim().toLowerCase();
    const status = statusFilter.value;
    const merged = mergeStatuses(MEMBERS);

    return merged.filter((member) => {
      const text = [
        member.name,
        member.role,
        member.race,
        member.type,
        member.tier ? `${member.tier}티어` : ""
      ].join(" ").toLowerCase();

      const matchQuery = !q || text.includes(q);
      const matchStatus = status === "all" || member.status === status;
      return matchQuery && matchStatus;
    });
  }

  function buildSummary(list) {
    const total = list.length;
    const live = list.filter((m) => m.status === "live").length;
    const players = list.filter((m) => m.type === "player").length;

    const cards = [
      { label: "전체 인원", value: total, sub: "감독 · 코치 · 학생 포함" },
      { label: "방송중", value: live, sub: "현재 LIVE 표시 인원" },
      { label: "학생", value: players, sub: "티어 등록 학생" },
      { label: "방송 체크", value: formatCheckedAt(lastCheckedAt), sub: "숲 방송 ON 여부 갱신 시각" }
    ];

    summaryGrid.innerHTML = cards.map(card => `
      <div class="summary-card">
        <div class="label">${card.label}</div>
        <div class="value">${card.value}</div>
        <div class="sub">${card.sub}</div>
      </div>
    `).join("");
  }

  function safeLink(url) {
    return url && url !== "#" ? url : "javascript:void(0)";
  }

  function getLeaderCoachCategory(member) {
    if (["김윤환", "이경민", "지동원", "배성흠"].includes(member.name)) return "Jack";
    if (["박준오", "박수범", "사테"].includes(member.name)) return "King";
    if (member.name === "파도튜브") return "Spade";
    return "";
  }

  function formatJoinDateText(name) {
    const value = JOIN_DATES[name];
    if (!value) return "-";

    const [year, month, day] = value.split("-").map(Number);
    const joinDate = new Date(year, month - 1, day);
    const today = new Date();
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const diffDays = Math.floor((todayDate - joinDate) / 86400000);
    const yy = String(year).slice(2);
    const mm = String(month).padStart(2, "0");
    const dd = String(day).padStart(2, "0");
    const dText = diffDays >= 0 ? `D+${diffDays}` : `D${diffDays}`;

    return `${yy}.${mm}.${dd}(${dText})`;
  }

  function createMemberCard(member) {
    const bannerClass = member.type === "leader" ? "leader" : member.type === "coach" ? "coach" : `t${member.tier}`;
    const tierText = member.type === "player"
  ? (member.tier === 9 ? "유스" : `${member.tier}티어`)
  : member.role;
    const statusText = member.status === "live" ? "방송중" : "오프라인";
    const statusClass = member.status === "live" ? "live" : "offline";
    const category = (member.type === "leader" || member.type === "coach") ? getLeaderCoachCategory(member) : "";
    const joinDateText = formatJoinDateText(member.name);
    const liveLink = member.live && member.live !== "#" ? member.live : member.stream;
    const streamButtonLink = member.stream;

    return `
      <article class="member-card">
        <div class="member-banner ${bannerClass}">
          <div class="badge-row status-only">
            ${
              member.status === "live" && liveLink && liveLink !== "#"
                ? `<a class="chip ${statusClass}" href="${safeLink(liveLink)}" target="_blank" rel="noopener noreferrer">${statusText}</a>`
                : `<span class="chip ${statusClass}">${statusText}</span>`
            }
          </div>
        </div>
        <div class="member-body">
          <div class="avatar-wrap ${member.status === "live" ? "live-border" : ""}">
            <img class="avatar" src="${member.profileImage}" alt="${member.name} 프로필 이미지" />
          </div>
          <div class="name-row">
            <div class="name">${member.name}</div>
            <div class="race-badge">${member.race}</div>
          </div>
          <div class="meta-list">
            <div class="meta-item"><span class="label">역할</span><span>${member.role}</span></div>
            ${member.type === "player" ? "" : `<div class="meta-item"><span class="label">분류</span><span>${category}</span></div>`}
            <div class="meta-item"><span class="label">입학일</span><span>${joinDateText}</span></div>
          </div>
          <div class="links">
            ${streamButtonLink && streamButtonLink !== "#" ? `<a class="btn-link btn-stream" href="${safeLink(streamButtonLink)}" target="_blank" rel="noopener noreferrer">방송국</a>` : ""}
            ${member.youtube && member.youtube !== "#" ? `<a class="btn-link btn-youtube" href="${safeLink(member.youtube)}" target="_blank" rel="noopener noreferrer">유튜브</a>` : ""}
            ${member.profile && member.profile !== "#" ? `<a class="btn-link btn-profile" href="${safeLink(member.profile)}" target="_blank" rel="noopener noreferrer">풀튜브</a>` : ""}
          </div>
        </div>
      </article>
    `;
  }

  function renderStaff(list) {

    coachCount.textContent = `${coaches.length}명`;

    leaderGrid.innerHTML = leaders.length ? leaders.map(createMemberCard).join("") : `<div class="empty">검색 결과가 없습니다.</div>`;
    coachGrid.innerHTML = coaches.length ? coaches.map(createMemberCard).join("") : `<div class="empty">검색 결과가 없습니다.</div>`;

  function renderPlayers(list) {
    const players = list.filter((m) => m.type === "player");
    playerCount.textContent = `${players.length}명`;

    const groups = players.reduce((acc, cur) => {
      if (!acc[cur.tier]) acc[cur.tier] = [];
      acc[cur.tier].push(cur);
      return acc;
    }, {});

    const tiers = [3, 4, 5, 6, 7, 8, 9];
    tierBoard.innerHTML = tiers.map((tier) => {
      const items = groups[tier] || [];
      return `
        <section class="tier-section">
          <div class="tier-title t${tier}">
            <div>
              <h3>${tierLabels[tier]}</h3>
              <p>${tierDescriptions[tier]}</p>
            </div>
            <div>${items.length}명</div>
          </div>
          ${items.length ? `<div class="tier-grid">${items.map(createMemberCard).join("")}</div>` : `<div class="empty">등록된 멤버가 없습니다.</div>`}
        </section>
      `;
    }).join("");
  }

  function render() {
    const filtered = getFilteredMembers();

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

          </div>
          <a class="notice-summary-link" href="${safeLink(item.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.summary || "")}</a>
          <div class="notice-meta">최종 갱신: ${formatCheckedAt(lastNoticeCheckedAt)}</div>
        </article>
      `;
    }).join("");
  }



  function formatYoutubeDate(value) {
    if (!value) return "";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}.${m}.${d}`;
  }

  function getYoutubeVideoId(url) {
    if (!url) return "";
    const patterns = [
      /youtube\.com\/watch\?v=([^&#?/]+)/i,
      /youtu\.be\/([^&#?/]+)/i,
      /youtube\.com\/shorts\/([^&#?/]+)/i,
      /youtube\.com\/embed\/([^&#?/]+)/i
    ];
    for (const pattern of patterns) {
      const match = String(url).match(pattern);
      if (match) return match[1];
    }
    try {
      const parsed = new URL(url);
      return parsed.searchParams.get("v") || "";
    } catch (error) {
      return "";
    }
  }

  window.onYouTubeIframeAPIReady = function () {
    youtubeApiReady = true;
    if (youtubeItems.length) selectYoutubeVideo(selectedYoutubeIndex, false, false);
  };

  function destroyYoutubePlayer() {
    if (youtubeApiPlayer && typeof youtubeApiPlayer.destroy === "function") {
      try { youtubeApiPlayer.destroy(); } catch (error) {}
    }
    youtubeApiPlayer = null;
    if (youtubePlayerMount) youtubePlayerMount.innerHTML = "";
  }

  function createYoutubePlayer(videoId, shouldAutoplay) {
    if (!videoId || !youtubePlayerMount) return false;
    destroyYoutubePlayer();

    if (!window.YT || !window.YT.Player || !youtubeApiReady) {
      const params = new URLSearchParams({
        rel: "0",
        playsinline: "1",
        modestbranding: "1",
        autoplay: shouldAutoplay ? "1" : "0"
      });
      youtubePlayerMount.innerHTML = `<iframe title="유튜브 플레이어" src="https://www.youtube.com/embed/${videoId}?${params.toString()}" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
      return true;
    }

    const mountId = `youtubePlayerMount_${Date.now()}`;
    youtubePlayerMount.innerHTML = `<div id="${mountId}"></div>`;
    youtubeApiPlayer = new YT.Player(mountId, {
      width: "100%",
      height: "100%",
      videoId,
      host: "https://www.youtube.com",
      playerVars: {
        autoplay: shouldAutoplay ? 1 : 0,
        rel: 0,
        playsinline: 1,
        modestbranding: 1,
        origin: window.location.origin
      },
      events: {
        onReady: (event) => {
          if (youtubeAutoplayEnabled) {
            try { event.target.playVideo(); } catch (error) {}
          }
        },
        onStateChange: (event) => {
          if (!youtubeAutoplayEnabled) return;
          if (event.data === YT.PlayerState.ENDED) playNextYoutubeVideo();
        },
        onError: () => {
          if (youtubeAutoplayEnabled) playNextYoutubeVideo();
        }
      }
    });
    return true;
  }

  function updateYoutubeAutoplayButton() {
    if (!youtubeAutoplayToggle) return;
    youtubeAutoplayToggle.textContent = youtubeAutoplayEnabled ? "자동재생 ON" : "자동재생 OFF";
    youtubeAutoplayToggle.classList.toggle("active", youtubeAutoplayEnabled);
    youtubeAutoplayToggle.setAttribute("aria-pressed", youtubeAutoplayEnabled ? "true" : "false");
  }

  function playNextYoutubeVideo() {
    if (!youtubeItems.length) return;
    const nextIndex = (selectedYoutubeIndex + 1) % youtubeItems.length;
    selectYoutubeVideo(nextIndex, false, true);
  }

  function selectYoutubeVideo(index, shouldScroll = false, forceAutoplay = false) {
    if (!youtubeItems.length) return;
    selectedYoutubeIndex = Math.max(0, Math.min(index, youtubeItems.length - 1));
    const item = youtubeItems[selectedYoutubeIndex];
    const videoUrl = item.url || item.link || item.embedUrl || "";
    const videoId = item.videoId || getYoutubeVideoId(videoUrl);
    if (!videoId || !createYoutubePlayer(videoId, forceAutoplay || youtubeAutoplayEnabled)) {
      youtubePlayer.classList.add("hidden");
      destroyYoutubePlayer();
      return;
    }

    youtubePlayer.classList.remove("hidden");
    youtubePlayerTitle.textContent = item.title || "";
    youtubePlayerMeta.textContent = getYoutubeMetaText(item);
    youtubePlayerOpen.href = safeLink(item.url || item.link || videoUrl);

    document.querySelectorAll(".youtube-card").forEach((card, cardIndex) => {
      card.classList.toggle("active", cardIndex === selectedYoutubeIndex);
    });

    if (shouldScroll) {
      youtubePlayer.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  function toggleYoutubeAutoplay() {
    youtubeAutoplayEnabled = !youtubeAutoplayEnabled;
    updateYoutubeAutoplayButton();

    if (youtubeAutoplayEnabled) {
      selectedYoutubeIndex = 0;
      selectYoutubeVideo(0, true, true);
    } else if (youtubeApiPlayer && typeof youtubeApiPlayer.pauseVideo === "function") {
      try { youtubeApiPlayer.pauseVideo(); } catch (error) {}
    }
  }

  function splitYoutubeMetaText(value) {
    const text = String(value || "").replace(/\s+/g, " ").trim();
    if (!text) return { views: "", age: "" };
    const parts = text.split(/\s*[•·]\s*/).map(part => part.trim()).filter(Boolean);
    if (parts.length >= 2) return { views: parts[0], age: parts.slice(1).join(" · ") };
    return { views: "", age: text };
  }

  function getYoutubeMetaText(item) {
    const raw = item.viewCountText || item.publishedText || "";
    const parsed = splitYoutubeMetaText(raw);
    const fallbackDate = formatYoutubeDate(item.publishedAt || item.published || item.updatedAt || "");
    const bits = [item.name || item.channelTitle || item.sourceName || "유튜브"];
    if (parsed.views) bits.push(parsed.views);
    if (parsed.age) bits.push(parsed.age);
    else if (fallbackDate) bits.push(fallbackDate);
    else if (item.year) bits.push(`${item.year}년`);
    return bits.filter(Boolean).join(" · ");
  }

  function getRelativeYoutubeTime(value) {
    const text = String(value || "");
    const match = text.match(/(\d+(?:\.\d+)?)\s*(초|분|시간|일|주|개월|년)\s*전/);
    if (!match) return 0;
    const amount = Number(match[1]);
    if (!Number.isFinite(amount)) return 0;
    const unit = match[2];
    const day = 24 * 60 * 60 * 1000;
    const unitMs = {
      "초": 1000,
      "분": 60 * 1000,
      "시간": 60 * 60 * 1000,
      "일": day,
      "주": 7 * day,
      "개월": 30 * day,
      "년": 365 * day
    }[unit] || 0;
    return Date.now() - amount * unitMs;
  }

  function getYoutubeSortTime(item) {
    const absolute = new Date(item.publishedAt || item.published || item.updatedAt || "").getTime();
    if (Number.isFinite(absolute)) return absolute;
    const relative = getRelativeYoutubeTime(item.viewCountText || item.publishedText || "");
    if (relative) return relative;
    return Number(item.year || 0) ? new Date(`${item.year}-01-01T00:00:00+09:00`).getTime() : 0;
  }

  function renderYoutube() {
    if (!youtubeItems.length) {
      youtubeCount.textContent = "0개";
      youtubePlayer.classList.add("hidden");
      destroyYoutubePlayer();
      youtubeList.innerHTML = `<div class="empty">유튜브 영상 데이터가 없습니다.</div>`;
      updateYoutubeAutoplayButton();
      return;
    }

    youtubeItems = youtubeItems
      .slice()
      .sort((a, b) => {
        const timeDiff = getYoutubeSortTime(b) - getYoutubeSortTime(a);
        if (timeDiff) return timeDiff;
        return (a._order || 0) - (b._order || 0);
      })
      .slice(0, 24);

    if (selectedYoutubeIndex >= youtubeItems.length) selectedYoutubeIndex = 0;
    youtubeCount.textContent = `${youtubeItems.length}개`;
    youtubeList.innerHTML = youtubeItems.map((item, index) => `
      <article class="youtube-card ${index === selectedYoutubeIndex ? "active" : ""}">
        <button class="youtube-card-btn" type="button" data-youtube-index="${index}">
          ${item.thumbnail ? `<img class="youtube-thumb" src="${safeLink(item.thumbnail)}" alt="${escapeHtml(item.title || "유튜브 영상")}">` : `<div class="youtube-thumb"></div>`}
          <div class="youtube-body">
            <div class="youtube-meta">
              <span>${escapeHtml(item.name || item.channelTitle || item.sourceName || "유튜브")}</span>
              <span>${escapeHtml(splitYoutubeMetaText(item.viewCountText || item.publishedText || "").age || formatYoutubeDate(item.publishedAt || item.published || item.updatedAt || item.year))}</span>
            </div>
            <span class="youtube-title">${escapeHtml(item.title || "")}</span>
            <div class="notice-meta">${escapeHtml(getYoutubeMetaText(item))}</div>
          </div>
        </button>
      </article>
    `).join("");

    youtubeList.querySelectorAll("[data-youtube-index]").forEach((button) => {
      button.addEventListener("click", () => {
        selectYoutubeVideo(Number(button.dataset.youtubeIndex), true, youtubeAutoplayEnabled);
      });
    });

    updateYoutubeAutoplayButton();
    selectYoutubeVideo(selectedYoutubeIndex, false, youtubeAutoplayEnabled);
  }

  function normalizeYoutubeItem(item, sourceName, order) {
    const url = item.url || item.link || (item.videoId ? `https://www.youtube.com/watch?v=${item.videoId}` : "");
    const videoId = item.videoId || getYoutubeVideoId(url || item.embedUrl);
    return {
      ...item,
      _order: order,
      sourceName,
      name: item.name || item.channelTitle || sourceName,
      url,
      link: item.link || url,
      videoId,
      title: item.title || "",
      thumbnail: item.thumbnail || (videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : ""),
      publishedAt: item.publishedAt || item.published || item.updatedAt || "",
      viewCountText: item.viewCountText || "",
      publishedText: item.publishedText || "",
      lengthText: item.lengthText || ""
    };
  }

  async function fetchYoutubeJson(url) {
    const response = await fetch(`${url}?t=${Date.now()}`, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  }

  async function fetchYoutube() {
    try {
      const results = await Promise.allSettled([
        fetchYoutubeJson(YOUTUBE_JSON_URL),
        fetchYoutubeJson(KAMRINI_JSON_URL)
      ]);

      const normalData = results[0].status === "fulfilled" ? results[0].value : null;
      const kamriniData = results[1].status === "fulfilled" ? results[1].value : null;

      const normalItems = Array.isArray(normalData?.items) ? normalData.items : [];
      const kamriniItems = Array.isArray(kamriniData?.items) ? kamriniData.items : [];

      youtubeItems = [
        ...normalItems.map((item, index) => normalizeYoutubeItem(item, item.name || item.channelTitle || "팬유튜브", index)),
        ...kamriniItems.map((item, index) => normalizeYoutubeItem(item, "캄린이", 10000 + index))
      ].filter(item => item.videoId && item.url);

      const seen = new Set();
      youtubeItems = youtubeItems.filter((item) => {
        if (seen.has(item.videoId)) return false;
        seen.add(item.videoId);
        return true;
      });

      lastYoutubeCheckedAt = normalData?.checkedAt || kamriniData?.scrapedAt || "";
      renderYoutube();
      console.log("유튜브 데이터 업데이트 성공", { normalData, kamriniData, total: youtubeItems.length });
    } catch (error) {
      console.log("유튜브 데이터 가져오기 실패", error);
      youtubeItems = [];
      renderYoutube();
    }
  }


  function renderInout() {
    const totalEvents = INOUT_HISTORY.reduce((sum, row) => sum + row.events.length, 0);
    const inEvents = INOUT_HISTORY.reduce((sum, row) => sum + row.events.filter(event => event.status === "IN").length, 0);
    const outEvents = INOUT_HISTORY.reduce((sum, row) => sum + row.events.filter(event => event.status === "OUT").length, 0);
    const activeTotal = inEvents - outEvents;
    inoutCount.textContent = `${totalEvents}건`;
    const inoutOverview = document.getElementById("inoutOverview");
    if (inoutOverview) {
      inoutOverview.innerHTML = `
        <div class="inout-stat-card mix"><div class="inout-stat-label">전체 기록</div><div class="inout-stat-value">${totalEvents}건</div><div class="inout-stat-note">SINCE 24.07.08</div></div>
        <div class="inout-stat-card"><div class="inout-stat-label">IN</div><div class="inout-stat-value">${inEvents}건</div><div class="inout-stat-note">입학 기록</div></div>
        <div class="inout-stat-card out"><div class="inout-stat-label">OUT</div><div class="inout-stat-value">${outEvents}건</div><div class="inout-stat-note">퇴학/자퇴 기록</div></div>
        <div class="inout-stat-card mix"><div class="inout-stat-label">현재 기준</div><div class="inout-stat-value">${activeTotal}명</div><div class="inout-stat-note">IN - OUT</div></div>`;
    }
    inoutList.innerHTML = INOUT_HISTORY.map((row) => {
      const hasIn = row.events.some(event => event.status === "IN");
      const hasOut = row.events.some(event => event.status === "OUT");
      const rowClass = hasIn && hasOut ? "mixed" : hasOut ? "has-out" : "has-in";
      return `
      <article class="inout-card ${rowClass}">
        <div class="inout-date">${row.date}</div>
        <div class="inout-events">
          ${row.events.map((event) => `
            <span class="inout-person">
              <span>${escapeHtml(event.name)}</span><span class="inout-race">${event.race}</span>
              <span class="inout-status ${event.status.toLowerCase()}">${event.status}</span>
            </span>
          `).join("")}
        </div>
      </article>`;
    }).join("");
  }

  function setActiveTab(activeTab) {
    [tabMain, tabNotice, tabInout, tabYoutube].forEach((tab) => tab.classList.remove("active"));
    activeTab.classList.add("active");
  }

  function hideAllScreens() {
    [mainScreen, noticeScreen, youtubeScreen, inoutScreen].forEach((screen) => screen.classList.add("hidden"));
  }

  function showMainScreen() {
    setActiveTab(tabMain);
    hideAllScreens();
    mainScreen.classList.remove("hidden");
  }

  function showNoticeScreen() {
    setActiveTab(tabNotice);
    hideAllScreens();
    noticeScreen.classList.remove("hidden");
    renderNotices();
  }

  function showYoutubeScreen() {
    setActiveTab(tabYoutube);
    hideAllScreens();
    youtubeScreen.classList.remove("hidden");
    renderYoutube();
  }

  function showInoutScreen() {
    setActiveTab(tabInout);
    hideAllScreens();
    inoutScreen.classList.remove("hidden");
    renderInout();
  }

  async function fetchLiveStatus() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    try {
      const response = await fetch(LIVE_STATUS_URL, {
        signal: controller.signal,
        cache: "no-store"
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      if (data && data.statuses) {
        liveStatusMap = data.statuses || {};
        lastCheckedAt = data.checkedAt || TEAM.updatedAt;
        console.log("LIVE 상태 업데이트 성공", data);
      }
    } catch (error) {
      if (error.name === "AbortError") {
        console.log("라이브 상태 요청 시간 초과 → 기존 상태 유지");
        return;
      }
      console.log("라이브 상태 가져오기 실패 → 기존 상태 유지", error);
    } finally {
      clearTimeout(timeoutId);
    }
  }

  async function fetchNotices() {
    try {
      const response = await fetch(`${NOTICE_JSON_URL}?t=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      noticeItems = Array.isArray(data.items) ? data.items : [];
      lastNoticeCheckedAt = data.checkedAt || "";
      renderNotices();
      console.log("공지 데이터 업데이트 성공", data);
    } catch (error) {
      console.log("공지 데이터 가져오기 실패", error);
      noticeItems = [];
      renderNotices();
    }
  }

  async function refreshLiveStatuses() {
    await fetchLiveStatus();
    render();
  }

  initHeader();
  render();
  renderNotices();
  renderYoutube();
  renderInout();
  refreshLiveStatuses();
  fetchNotices();
  fetchYoutube();

  setInterval(refreshLiveStatuses, 20000);
  setInterval(fetchNotices, 30000);
  setInterval(fetchYoutube, 60000);

  searchInput.addEventListener("input", render);
  statusFilter.addEventListener("change", render);
  tabMain.addEventListener("click", showMainScreen);
  tabNotice.addEventListener("click", showNoticeScreen);
  tabYoutube.addEventListener("click", showYoutubeScreen);
  tabInout.addEventListener("click", showInoutScreen);
  youtubeAutoplayToggle.addEventListener("click", toggleYoutubeAutoplay);
</script>
